<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    
    <div id="score-board">
        <div class="scores">
            <h3>Home</h3>
            <div id="home-score" class="score-display">

            </div>
            <button class="add1" onclick="add1home()">+1</button>
            <button class="add2" onclick="add2home()">+2</button>
            <button class="add3" onclick="add3home()">+3</button>
        </div>

        <div class="scores">
            <h3>Guest</h3>
            <div id="guest-score" class="score-display">
                
            </div>
            <button class="add1" onclick="add1guest()">+1</button>
            <button class="add2" onclick="add2guest()">+2</button>
            <button class="add3" onclick="add3guest()">+3</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
